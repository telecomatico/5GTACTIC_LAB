info:
  version: 1.0.2
  description: NSSF configuration

configuration:
  nssfName: NSSF
  sbi:
    scheme: http
    registerIPv4: 10.10.10.155
    bindingIPv4: 10.10.10.155
    port: 8000
    tls:
      pem: cert/nssf.pem
      key: cert/nssf.key

  serviceNameList:
    - nnssf-nsselection
    - nnssf-nssaiavailability

  nrfUri: http://10.10.10.155:8000
  nrfCertPem: cert/nrf.pem

  supportedPlmnList:
    - mcc: 208
      mnc: 93

  supportedNssaiInPlmnList:
    - plmnId:
        mcc: 208
        mnc: 93
      supportedSnssaiList:
        - sst: 1
          sd: 010203

  nsiList:
    - snssai:
        sst: 1
        sd: 010203
      nsiInformationList:
        - nrfId: http://10.10.10.155:8000/nnrf-nfm/v1/nf-instances
          nsiId: 10

  amfSetList:
    - amfSetId: 1
      amfList:
        - 000001
      nrfAmfSet: http://10.10.10.155:8000/nnrf-nfm/v1/nf-instances

  amfList: []

  taList:
    - tai:
        plmnId:
          mcc: 208
          mnc: 93
        tac: 1
      accessType: 3GPP_ACCESS
      supportedSnssaiList:
        - sst: 1
          sd: 010203

  mappingListFromPlmn: []

logger:
  enable: true
  level: info
  reportCaller: false
