          sNssaiList:
            - sst: 2
              sd: 000001
  mappingListFromPlmn:
    - operatorName: NTT Docomo
      homePlmnId:
        mcc: 440
        mnc: 10
      mappingOfSnssai:
        - servingSnssai:
            sst: 1
            sd: 000001
          homeSnssai:
            sst: 1
            sd: 1
        - servingSnssai:
            sst: 1
            sd: 000002
          homeSnssai:
            sst: 1
            sd: 000003
        - servingSnssai:
            sst: 1
            sd: 000003
          homeSnssai:
            sst: 1
            sd: 000004
        - servingSnssai:
            sst: 2
            sd: 000001
