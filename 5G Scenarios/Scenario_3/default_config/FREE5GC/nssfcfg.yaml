            tac: 33456
          supportedSnssaiList:
            - sst: 1
            - sst: 1
              sd: 000001
            - sst: 1
              sd: 000002
            - sst: 2
        - tai:
            plmnId:
              mcc: 466
              mnc: 92
            tac: 33458
          supportedSnssaiList:
            - sst: 1
            - sst: 1
              sd: 000001
            - sst: 2
            - sst: 2
              sd: 000001
  taList:
    - tai:
        plmnId:
          mcc: 466
          mnc: 92
        tac: 33456
      accessType: 3GPP_ACCESS
      supportedSnssaiList:
        - sst: 1
        - sst: 1
          sd: 000001
        - sst: 1
          sd: 000002
        - sst: 2
    - tai:
        plmnId:
          mcc: 466
          mnc: 92
        tac: 33457
      accessType: 3GPP_ACCESS
      supportedSnssaiList:
        - sst: 1
        - sst: 1
          sd: 000001
        - sst: 1
          sd: 000002
        - sst: 2
    - tai:
        plmnId:
          mcc: 466
